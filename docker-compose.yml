version: '3.8'

services:
  class-pet-garden:
    build: .
    image: class-pet-garden:latest
    container_name: class-pet-garden
    ports:
      - "8080:8080"
    volumes:
      # 映射数据目录到本地 ./data/ 文件夹
      - ./data:/app/data
    environment:
      # Database path (inside container)
      - DB_PATH=/app/data/classpet.db
      # JWT secret (change in production!)
      - JWT_SECRET=dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0dG9rZW5nZW5lcmF0aW9uMjAyNA==
      # JWT token expiration (24 hours)
      - JWT_EXPIRATION_MS=86400000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/pets"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3


