name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  # GitHub Container Registry
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository }}
  
  # DockerHub
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/class-pet-garden
  
  # Alibaba Cloud ACR (йЏ‰о…һзҒһйҚ–е“„з…™)
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ACR_IMAGE: ${{ secrets.ACR_NAMESPACE }}/class-pet-garden

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Container Registry йђ§иҮІз¶Қ
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # DockerHub йђ§иҮІз¶Қ
      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # й—ѓеқ—е™·жµњ?ACR йђ§иҮІз¶Қ
      - name: Log in to Alibaba Cloud ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # йҺ»ж„¬еҢ‡ GHCR й—Ђж»ѓе„љйҚЏе†©жљџйҺ№?      - name: Extract metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # йҺ»ж„¬еҢ‡ DockerHub й—Ђж»ѓе„љйҚЏе†©жљџйҺ№?      - name: Extract metadata for DockerHub
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # йҺ»ж„¬еҢ‡ ACR й—Ђж»ѓе„љйҚЏе†©жљџйҺ№?      - name: Extract metadata for ACR
        id: meta-acr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # йЏ‹е‹«зә“йҒһи€µеё№й–«дҢёеџЊйҺµв‚¬йЏ€е¤‹ж•һйҚђеІѓгЂѓ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-acr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
