spring.application.name=class-pet-garden
server.port=8080

# SQLite + HikariCP 调优（SQLite 单写多读，pool=1）
spring.datasource.url=jdbc:sqlite:./classpet.db?busy_timeout=30000&journal_mode=WAL&synchronous=NORMAL
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable default DataSource initialization (we manage schema via JPA)
spring.datasource.initialization-mode=never
spring.jpa.defer-datasource-initialization=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Disable thymeleaf caching
spring.thymeleaf.cache=false

